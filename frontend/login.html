<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="d-flex align-items-center min-vh-100 app-bg py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-4 auth-card shadow-sm p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="logo-box mx-auto mb-3 text-white fs-4 shadow-sm" style="width: 60px; height: 60px;">CH</div>
                    <h3 class="fw-bold mb-1 text-teal">Welcome Back</h3>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small ms-1">Email Address</label>
                        <input type="email" id="emailInput" placeholder="Enter your email" class="form-control custom-input" required>
                    </div>
                    <div class="mb-4">
                        <label for="passwordInput" class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
                    
                    <div id="login-error" class="alert alert-danger py-2 mb-3 text-center" style="display: none; font-size: 0.9rem; border-radius: 10px;">
                        </div>

                    <button type="submit" class="btn btn-orange w-100 py-2 rounded-pill fw-bold">Login</button>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted small">Need an account? </span>
                        <a href="register.html" class="text-decoration-none fw-bold text-teal small">Register here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
