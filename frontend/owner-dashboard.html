<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seller Central - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .btn-orange { background-color: #FF6B35; color: white; border: none; }
        .btn-orange:hover { background-color: #e55a2b; color: white; }
    </style>
</head>
<body class="app-bg pb-5 mb-5">
    
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white">
                <div class="logo-box me-3 fs-5" style="width: 45px; height: 45px;">CH</div>
                <div>
                    <h5 class="mb-0 fw-bold">Seller Central</h5>
                    <small class="text-white-50" style="font-size: 0.75rem;">Store Management</small>
                </div>
            </a>
            <a href="profile.html" class="text-white text-decoration-none">
                <i class="bi bi-person-circle fs-3"></i>
            </a>
        </div>
    </header>

    <main id="app-content" class="container" style="margin-top: 100px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1" style="color: #2c3e50;">My Store</h3>
                <p class="text-muted small mb-0">Manage your BUP student business.</p>
            </div>
            <button class="btn btn-orange rounded-pill shadow-sm fw-bold px-3 py-2 d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#addItemModal">
                <i class="bi bi-plus-lg me-1"></i> Add Item
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="card bg-white border-0 h-100 p-3 shadow-sm rounded-4 text-center">
                    <div class="icon-circle bg-orange-light text-orange mx-auto mb-2" style="width: 40px; height: 40px; font-size: 1.2rem;"><i class="bi bi-wallet2"></i></div>
                    <h5 class="fw-bold text-dark mb-0">₱850.00</h5>
                    <p class="mb-0 text-muted" style="font-size: 0.75rem;">Today's Revenue</p>
                </div>
            </div>
            <div class="col-6">
                <div class="card bg-white border-0 h-100 p-3 shadow-sm rounded-4 text-center">
                    <div class="icon-circle bg-blue-light text-teal mx-auto mb-2" style="width: 40px; height: 40px; font-size: 1.2rem;"><i class="bi bi-bell"></i></div>
                    <h5 class="fw-bold text-dark mb-0">4</h5>
                    <p class="mb-0 text-muted" style="font-size: 0.75rem;">Active Orders</p>
                </div>
            </div>
        </div>

        <h6 class="fw-bold mb-3 text-dark d-flex align-items-center">
            Needs Action <span class="badge bg-danger rounded-pill ms-2">2</span>
        </h6>
        
        <div class="d-flex flex-column gap-3 mb-4">
            <div class="card border-0 rounded-4 shadow-sm bg-white border-start border-warning border-4">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <span class="badge bg-warning text-dark rounded-pill mb-1">Pending</span>
                            <h6 class="mb-0 fw-bold text-dark">Grace Ann Carilla</h6>
                            <small class="text-muted">2x CurryalaIT</small>
                        </div>
                        <h6 class="text-success fw-bold mb-0">₱130.00</h6>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-sm btn-success w-50 rounded-pill fw-bold shadow-sm">Accept</button>
                        <button class="btn btn-sm btn-outline-danger w-50 rounded-pill fw-bold">Decline</button>
                    </div>
                </div>
            </div>

            <div id="orders-list">
                <h6 class="fw-bold mb-3 text-dark d-flex align-items-center">
                    Needs Action <span class="badge bg-danger rounded-pill ms-2" id="order-count">0</span>
                </h6>
                
                <div class="d-flex flex-column gap-3 mb-4" id="orders-list">
                    <p class="text-muted small text-center mt-2">Loading orders...</p>
                </div>
            </div>

            <div class="card border-0 rounded-4 shadow-sm bg-white action-card">
                <div class="card-body p-2 d-flex align-items-center">
                    <div class="bg-light rounded-3 d-flex align-items-center justify-content-center me-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-cup-hot text-muted fs-3"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="mb-0 fw-bold text-dark" style="font-size: 0.9rem;">CurryalaIT</h6>
                        <small class="text-muted d-block">Stock: 5 orders left</small>
                        <small class="text-success fw-bold">₱65.00</small>
                    </div>
                    <div class="pe-2">
                        <div class="form-check form-switch fs-4">
                            <input class="form-check-input" type="checkbox" role="switch" checked>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4 border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold text-dark" id="addItemModalLabel">Add New Product</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addItemForm">
                            <div class="mb-3">
                                <label for="itemName" class="form-label text-muted small fw-bold">Product Name</label>
                                <input type="text" class="form-control rounded-3" id="itemName" required placeholder="e.g., BUP Lanyard">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="itemPrice" class="form-label text-muted small fw-bold">Price (₱)</label>
                                    <input type="number" class="form-control rounded-3" id="itemPrice" required placeholder="0.00">
                                </div>
                                <div class="col-6">
                                    <label for="itemStock" class="form-label text-muted small fw-bold">Initial Stock</label>
                                    <input type="number" class="form-control rounded-3" id="itemStock" required placeholder="10">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="itemCategory" class="form-label text-muted small fw-bold">Category</label>
                                <select class="form-select custom-input rounded-3" id="itemCategory" required>
                                    <option value="" disabled selected>Select a category...</option>
                                    <option value="Snacks">Snacks</option>
                                    <option value="Drinks">Drinks</option>
                                    <option value="Lunch Meals">Lunch Meals</option>
                                    <option value="Merch">Merch</option>
                                    <option value="Supplies">Supplies</option>
                                </select>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-orange rounded-pill fw-bold py-2">Add Item</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/owner.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
