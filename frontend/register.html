<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="d-flex align-items-center min-vh-100 app-bg py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-5 auth-card shadow-sm p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="logo-box mx-auto mb-3 text-white fs-4 shadow-sm" style="width: 60px; height: 60px;">CH</div>
                    <h3 class="fw-bold mb-1 text-teal">Create Account</h3>
                    <p class="text-muted small">Join the BUP Campus Hub</p>
                </div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small ms-1">Full Name</label>
                        <input type="text" id="name" class="form-control custom-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small ms-1">Email Address</label>
                        <input type="email" id="email" class="form-control custom-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small ms-1">Password</label>
                        <input type="password" id="password" class="form-control custom-input" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted small ms-1">I am a...</label>
                        <select id="roleSelect" class="form-select custom-input text-muted">
                            <option value="student">student</option>
                            <option value="seller">seller</option>
                        </select>
                    </div>
                    <div id="studentFields">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small ms-1">College</label>
                            <input type="text" id="college" class="form-control custom-input">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small ms-1">Academic Course</label>
                            <input type="text" id="course" class="form-control custom-input">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-orange w-100 py-2 rounded-pill fw-bold">Register</button>
                    <div class="text-center mt-4">
                        <span class="text-muted small">Already have an account? </span>
                        <a href="login.html" class="text-decoration-none fw-bold text-teal small">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
