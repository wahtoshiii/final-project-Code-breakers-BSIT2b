<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
</head>
<body>
        <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 border p-4 shadow-sm bg-light rounded">
            <h2 class="text-center mb-4">Create Account</h2>
                <form action="#" method="POST">
                    <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Juan Dela Cruz" required="">
                    </div>

                    <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email_address" class="form-control" placeholder="user@bicol-u.edu.ph" required="">
                    </div>

                    <div class="mb-3">
                    <label class="form-label" for="password_hash">Password</label>
                    <input type="password" id="password_hash" name="password_hash" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <div class="mb-3">
                    <label class="form-label" for="roleSelect">I am a...</label>
                    <select name="role" class="form-select" id="roleSelect">
                        <option value="student">Student</option>
                        <option value="owner">Establishment Owner</option>
                    </select>
                    </div>

                    <div id="studentFields">
                    <div class="mb-3">
                        <label class="form-label">College</label>
                        <input type="text" name="college" class="form-control" placeholder="e.g., BUP">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Academic Course</label>
                        <input type="text" name="academic_course" class="form-control" placeholder="e.g., BSIT">
                    </div>
                    </div>

                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                </div>
            </div>
            </div>

            <form id="registerForm">
                <input type="text" id="name" required />
                <input type="email" id="email" required />
                <input type="password" id="password" required />
                <button type="submit">Register</button>
                </form>
                <script src="/js/register.js"></script>

        </body>
    </html>
