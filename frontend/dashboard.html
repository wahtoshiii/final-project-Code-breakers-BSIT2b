<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Service Hub – Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">

    <div class="container py-4">
        <h2 class="mb-4">Campus Service Hub</h2>

        <!-- Search Bar (Task 4) -->
        <div class="mb-4">
            <input type="text" id="search" class="form-control" placeholder="Search by name..." />
        </div>

        <!-- Orders Table (Main Display) -->
        <div class="card shadow-sm mb-5">
            <div class="card-header bg-white">
                <h5 class="mb-0">Incoming Orders</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Order ID</th>
                                <th>Buyer</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="orderList">
                            <!-- JS will inject orders here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Users Section -->
        <section class="mb-5">
            <h4 class="mb-3">Users</h4>
            <div id="userList" class="row g-3">
                <!-- JS will inject user cards here -->
            </div>
        </section>

        <!-- Products Section -->
        <section class="mb-5">
            <h4 class="mb-3">Products</h4>
            <div id="productList" class="row g-3">
                <!-- JS will inject product cards here -->
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
