<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Assistant - Campus Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        /* Chat-specific styling to keep the layout clean */
        body { overflow: hidden; } /* Prevent whole page scroll, only chat area scrolls */
        
        .chat-container {
            height: calc(100vh - 180px); /* Adjusts for header and bottom inputs */
            overflow-y: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        .chat-bubble {
            max-width: 80%;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Bot Message Styling */
        .bot-msg .chat-bubble {
            background-color: #ffffff;
            color: #2c3e50;
            border-bottom-right-radius: 20px;
            border-top-right-radius: 20px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 4px;
        }

        /* User Message Styling */
        .user-msg { justify-content: flex-end; }
        .user-msg .chat-bubble {
            background-color: #FF6B35; /* Primary Orange */
            color: #ffffff;
            border-bottom-left-radius: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 4px;
        }

        /* Input Area positioned exactly above the bottom nav */
        .chat-input-area {
            position: fixed;
            bottom: 70px; /* Sits right above the bottom nav */
            left: 0;
            right: 0;
            background: #f8f9fa;
            z-index: 1020;
        }
        
        .btn-send { background-color: #FF6B35; color: white; border: none; }
        .btn-send:hover { background-color: #e55a2b; color: white; }
    </style>
</head>
<body class="app-bg pb-5 mb-5">
    
    <!-- Top Header -->
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white nav-trigger" data-target="dashboard.html">
                <div class="logo-box me-3 fs-5" style="width: 45px; height: 45px;">CH</div>
                <div>
                    <h5 class="mb-0 fw-bold">Campus Hub</h5>
                    <small class="text-white-50" style="font-size: 0.75rem;">AI Assistant</small>
                </div>
            </a>
            <a href="profile.html" class="text-white text-decoration-none nav-trigger" data-target="profile.html"><i class="bi bi-person-circle fs-3"></i></a>
        </div>
    </header>

    <!-- Main Chat Content -->
    <main id="app-content" class="container" style="margin-top: 90px;">
        
        <!-- Chat History Area -->
        <div class="chat-container d-flex flex-column gap-3 pe-2" id="chatBox">
            <!-- Initial Bot Greeting -->
            <div class="d-flex bot-msg w-100 mt-3">
                <div class="icon-circle bg-blue-light text-teal me-2 shadow-sm flex-shrink-0" style="width: 35px; height: 35px;"><i class="bi bi-robot"></i></div>
                <div class="chat-bubble p-3 shadow-sm">
                    Hello! I am the AI Campus Assistant for BUP. 🎓<br><br>You can ask me about:<br>• Campus navigation & buildings<br>• Student Marketplace orders<br>• FAQs & requirements. <br><br>How can I help you today?
                </div>
            </div>
            <!-- Dynamic messages will be injected here by JS -->
        </div>

    </main>

    <!-- Fixed Chat Input Field -->
    <div class="chat-input-area p-3 border-top shadow-sm">
        <div class="container">
            <div class="input-group bg-white rounded-pill shadow-sm p-1">
                <input type="text" id="userInput" class="form-control border-0 bg-transparent ps-3" placeholder="Ask me anything about BUP..." style="box-shadow: none;">
                <button class="btn btn-send rounded-circle d-flex align-items-center justify-content-center me-1" id="sendBtn" style="width: 40px; height: 40px;">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav fixed-bottom bg-white border-top shadow-lg d-flex justify-content-around align-items-center pb-2 pt-2 px-1">
        <a href="dashboard.html" class="nav-item nav-trigger" data-target="dashboard.html"><i class="bi bi-stars fs-5 d-block"></i><span>Home</span></a>
        <a href="maps.html" class="nav-item nav-trigger" data-target="map.html"><i class="bi bi-map fs-5 d-block"></i><span>Map</span></a>
        <!-- Active Tab -->
        <a href="chat.html" class="nav-item active nav-trigger" data-target="chat.html"><i class="bi bi-chat fs-5 d-block"></i><span>Chat</span></a>
        <a href="manage-products.html" class="nav-item nav-trigger" data-target="manage-products.html"><i class="bi bi-bag fs-5 d-block"></i><span>Market</span></a>
        <a href="explore.html" class="nav-item nav-trigger" data-target="explore.html"><i class="bi bi-building fs-5 d-block"></i><span>Explore</span></a>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
