<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marketplace - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .btn-orange { background-color: #FF6B35; color: white; border: none; }
        .btn-orange:hover { background-color: #e55a2b; color: white; }
        /* Hides scrollbar for category menu but keeps it scrollable */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="app-bg pb-5 mb-5">
    
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white nav-trigger" data-target="dashboard.html">
                <div class="logo-box me-3 fs-5" style="width: 45px; height: 45px;">CH</div>
                <div>
                    <h5 class="mb-0 fw-bold">Campus Hub</h5>
                    <small class="text-white-50" style="font-size: 0.75rem;">BUP Student Guide</small>
                </div>
            </a>
            
            <div class="d-flex align-items-center">
                <a href="#" class="text-white text-decoration-none position-relative me-4" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                    <i class="bi bi-cart3 fs-3"></i>
                    <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem; display: none;">0</span>
                </a>
                
                <a href="profile.html" class="text-white text-decoration-none nav-trigger" data-target="profile.html">
                    <i class="bi bi-person-circle fs-3"></i>
                </a>
            </div>
        </div>
    </header>

    <main id="app-content" class="container" style="margin-top: 100px;">
        
        <div class="mb-4">
            <h3 class="fw-bold mb-1" style="color: #2c3e50;">Student Marketplace</h3>
            <p class="text-muted small mb-0">Discover and support products from fellow Entrep students.</p>
        </div>

        <div class="d-flex overflow-auto gap-2 mb-4 pb-1 hide-scrollbar" id="categoryFilters" style="white-space: nowrap;">
            <button class="btn btn-orange rounded-pill px-3 filter-btn shadow-sm" data-category="All">All Items</button>
            <button class="btn btn-outline-secondary bg-white rounded-pill px-3 filter-btn shadow-sm" data-category="Snacks">Snacks</button>
            <button class="btn btn-outline-secondary bg-white rounded-pill px-3 filter-btn shadow-sm" data-category="Drinks">Drinks</button>
            <button class="btn btn-outline-secondary bg-white rounded-pill px-3 filter-btn shadow-sm" data-category="Lunch Meals">Lunch Meals</button>
            <button class="btn btn-outline-secondary bg-white rounded-pill px-3 filter-btn shadow-sm" data-category="Merch">Merch</button>
            <button class="btn btn-outline-secondary bg-white rounded-pill px-3 filter-btn shadow-sm" data-category="Supplies">Supplies</button>
        </div>

        <div class="row g-3">
            <p class="text-center text-muted small mt-4">Loading marketplace...</p>
        </div>
    </main>

    <div class="offcanvas offcanvas-end rounded-start-4 border-0 shadow" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartLabel" style="width: 350px; max-width: 90vw;">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold text-dark" id="cartLabel"><i class="bi bi-cart3 me-2"></i>My Cart</h5>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <div id="cartItemsContainer" class="flex-grow-1 overflow-auto p-3">
                <div id="emptyCartMsg" class="text-center text-muted mt-5">
                    <i class="bi bi-cart-x fs-1 mb-2"></i>
                    <p>Your cart is empty.</p>
                </div>
            </div>
            
            <div class="border-top p-3 bg-light">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-muted fw-bold">Total Amount:</span>
                    <h4 class="text-success fw-bold mb-0" id="cartTotal">₱0.00</h4>
                </div>
                <button class="btn btn-orange w-100 rounded-pill shadow-sm fw-bold py-2" id="checkoutBtn" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/role-nav.js"></script>
    <script src="js/manage-products.js"></script>
</body>
</html>
