<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .text-orange { color: #FF6B35; }
        .bg-orange { background-color: #FF6B35; }
    </style>
</head>
<body class="app-bg pb-5">
    <header class="bg-dark text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center">
            <a href="#" id="admin-logout-btn" class="text-white"><i class="bi bi-arrow-left fs-4 me-3"></i></a>
            <h5 class="mb-0 fw-bold">Admin Panel</h5>
        </div>
    </header>
    
    <main class="container" style="margin-top: 100px;">
        
        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-header bg-white pt-4 border-0">
                <h6 class="fw-bold">Registered Users</h6>
            </div>
            <div class="card-body" id="registered-users-container">
                <p class="text-muted small text-center">Loading users...</p>
            </div>
        </div>

        <h3 class="fw-bold mb-4 mt-5">Admin Control Panel</h3>

        <section class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold"><i class="bi bi-box-seam me-2"></i>Available Products</h5>
                <span class="badge bg-orange" id="productCount">0 Products</span>
            </div>
            <div class="table-responsive shadow-sm rounded-4 bg-white p-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small">
                        <tr>
                            <th>Product</th>
                            <th>Seller</th>
                            <th>Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductList">
                        <tr><td colspan="4" class="text-center text-muted py-3">Loading products...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h5 class="fw-bold mb-3"><i class="bi bi-receipt me-2"></i>Global Transaction Logs</h5>
            <div class="table-responsive shadow-sm rounded-4 bg-white p-3">
                <table class="table table-sm table-hover align-middle mb-0">
                    <thead class="table-light text-muted small">
                        <tr>
                            <th>Date</th>
                            <th>Buyer</th>
                            <th>Product</th>
                            <th>Seller</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="adminTransactionLog">
                        <tr><td colspan="5" class="text-center text-muted py-3">Loading logs...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script> 
</body>
</html>
