<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explore - Campus Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Dedicated Explore CSS -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="app-bg pb-5 mb-5">
    
    <!-- Top Header -->
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white">
                <div class="logo-box me-3 fs-5" style="width: 45px; height: 45px;">CH</div>
                <div>
                    <h5 class="mb-0 fw-bold">Campus Hub</h5>
                    <small class="text-white-50" style="font-size: 0.75rem;">BUP Student Guide</small>
                </div>
            </a>
            <a href="profile.html" class="text-white text-decoration-none"><i class="bi bi-person-circle fs-4"></i></a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="margin-top: 100px;">
        <h4 class="fw-bold mb-1" style="color: #2c3e50;">Explore Campus</h4>
        <p class="text-muted mb-4 small">Take a virtual tour before visiting</p>
        
        <!-- Location List -->
        <div class="d-flex flex-column gap-3 mb-4">
            
            <!-- Library Card -->
            <div class="card border-0 rounded-4 shadow-sm text-decoration-none explore-card p-2">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-circle bg-light text-primary me-3 shadow-sm" style="width: 45px; height: 45px;"><i class="bi bi-book"></i></div>
                            <div>
                                <h6 class="mb-0 fw-bold text-dark">University Library</h6>
                                <small class="text-muted" style="font-size: 0.75rem;">Academic Facility</small>
                            </div>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                    <!-- Status Badges -->
                    <div class="d-flex gap-2 align-items-center flex-wrap mt-2">
                        <span class="badge badge-soft-success rounded-pill px-3 py-2 fw-medium">Open</span>
                        <span class="badge badge-soft-warning rounded-pill px-3 py-2 fw-medium text-dark">Medium Crowd</span>
                        <span class="badge border bg-white text-dark rounded-pill px-3 py-2 fw-medium shadow-sm"><i class="bi bi-star-fill text-warning me-1"></i> 4.8</span>
                    </div>
                </div>
            </div>

            <!-- Cafeteria Card -->
            <div class="card border-0 rounded-4 shadow-sm text-decoration-none explore-card p-2">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-circle bg-light text-purple me-3 shadow-sm" style="width: 45px; height: 45px;"><i class="bi bi-cup-straw" style="color: #6f42c1;"></i></div>
                            <div>
                                <h6 class="mb-0 fw-bold text-dark">Campus Cafeteria</h6>
                                <small class="text-muted" style="font-size: 0.75rem;">Dining</small>
                            </div>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                    <!-- Status Badges -->
                    <div class="d-flex gap-2 align-items-center flex-wrap mt-2">
                        <span class="badge badge-soft-success rounded-pill px-3 py-2 fw-medium">Open</span>
                        <span class="badge badge-soft-danger rounded-pill px-3 py-2 fw-medium">High Crowd</span>
                        <span class="badge border bg-white text-dark rounded-pill px-3 py-2 fw-medium shadow-sm"><i class="bi bi-star-fill text-warning me-1"></i> 4.5</span>
                    </div>
                </div>
            </div>

            <!-- Placeholder Card for scrolling -->
            <div class="card border-0 rounded-4 shadow-sm text-decoration-none explore-card p-2" style="opacity: 0.6;">
                <div class="card-body py-4">
                    <div class="text-center text-muted small"><i class="bi bi-lock me-2"></i>More locations unlocking soon</div>
                </div>
            </div>

        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav fixed-bottom bg-white border-top shadow-lg d-flex justify-content-around align-items-center pb-2 pt-2 px-1">
        <a href="dashboard.html" class="nav-item"><i class="bi bi-stars fs-5 d-block"></i><span>Home</span></a>
        <a href="map.html" class="nav-item"><i class="bi bi-map fs-5 d-block"></i><span>Map</span></a>
        <a href="chat.html" class="nav-item"><i class="bi bi-chat fs-5 d-block"></i><span>Chat</span></a>
        <a href="manage-products.html" class="nav-item"><i class="bi bi-bag fs-5 d-block"></i><span>Market</span></a>
        <!-- Active Tab is Explore -->
        <a href="explore.html" class="nav-item active"><i class="bi bi-building fs-5 d-block"></i><span>Explore</span></a>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/explore.js"></script>
</body>
</html>
