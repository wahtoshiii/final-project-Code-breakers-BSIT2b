<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Map - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="app-bg pb-5 mb-5">
    
    <!-- Top Header -->
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white">
                <div class="logo-box me-3 fs-5" style="width: 45px; height: 45px;">CH</div>
                <div>
                    <h5 class="mb-0 fw-bold">Campus Hub</h5>
                    <small class="text-white-50" style="font-size: 0.75rem;">BUP Student Guide</small>
                </div>
            </a>
            <a href="profile.html" class="text-white text-decoration-none"><i class="bi bi-person-circle fs-4"></i></a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="margin-top: 100px;">
        
        <!-- Search Bar -->
        <div class="input-group shadow-sm rounded-4 overflow-hidden mb-4 border-0">
            <span class="input-group-text bg-white border-0 ps-4"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0 py-3 bg-white" placeholder="Search buildings, offices, shops..." aria-label="Search map">
        </div>
        
        <!-- Real Google Map Container -->
        <div class="map-container shadow-sm border-0">
            <div id="map" style="height: 450px; width: 100%; border-radius: 20px;"></div>
        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav fixed-bottom bg-white border-top shadow-lg d-flex justify-content-around align-items-center pb-2 pt-2 px-1">
        <a href="dashboard.html" class="nav-item"><i class="bi bi-stars fs-5 d-block"></i><span>Home</span></a>
        <a href="map.html" class="nav-item active"><i class="bi bi-map fs-5 d-block"></i><span>Map</span></a>
        <a href="chat.html" class="nav-item"><i class="bi bi-chat fs-5 d-block"></i><span>Chat</span></a>
        <a href="manage-products.html" class="nav-item"><i class="bi bi-bag fs-5 d-block"></i><span>Market</span></a>
        <a href="explore.html" class="nav-item"><i class="bi bi-building fs-5 d-block"></i><span>Explore</span></a>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your Custom Map Logic -->
    <script src="js/maps.js"></script>

    <!-- Google Maps API (Replace YOUR_API_KEY_HERE) -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIjWONXqDy2EKvkIRg-Q4VODNmlv7fDU8&callback=initMap"></script>
</body>
</html>
