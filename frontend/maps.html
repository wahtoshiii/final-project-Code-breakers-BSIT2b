<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUPC Interactive Hub</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #08111c; }
        #wrap { width: 100%; height: 100vh; position: relative; }
        #c { display: block; width: 100%; height: 100vh; }
        
        #tt {
            position: absolute; display: none; pointer-events: none;
            background: rgba(5,12,22,0.95); border: 1px solid #c85020;
            border-radius: 8px; padding: 8px 14px; z-index: 10;
            box-shadow: 0 4px 20px rgba(200,80,32,0.3);
        }
        #tt .n { font-weight: 700; font-size: 13px; color: #ff8050; font-family: sans-serif; }
        #tt .d { font-size: 10px; color: #7090b0; margin-top: 2px; font-family: sans-serif; }
        
        #hint {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(5,12,22,0.9); border: 1px solid #1a3040;
            border-radius: 14px; padding: 4px 14px;
            color: #506070; font-size: 11px; font-family: sans-serif; white-space: nowrap;
        }
        
        #legend {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(5,12,22,0.9); border: 1px solid #1a3040;
            border-radius: 8px; padding: 8px 12px; font-family: sans-serif;
        }
        .lr { display: flex; align-items: center; gap: 7px; font-size: 10px; color: #506070; margin: 2px 0; }
        .ld { width: 9px; height: 9px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="wrap">
        <canvas id="c"></canvas>
        <div id="tt">
            <div class="n" id="tn"></div>
            <div class="d" id="td"></div>
        </div>
        <div id="hint">🖱 Drag to rotate · Scroll to zoom · Hover to inspect</div>
        <div id="legend">
            <div class="lr"><div class="ld" style="background:#2258a8"></div>Academic</div>
            <div class="lr"><div class="ld" style="background:#ff69b4"></div>CS & Engineering</div>
            <div class="lr"><div class="ld" style="background:#922424"></div>Admin / Services</div>
            <div class="lr"><div class="ld" style="background:#196634"></div>Student Facilities</div>
            <div class="lr"><div class="ld" style="background:#5a4c14"></div>Utility</div>
        </div>
    </div>

     <nav class="bottom-nav fixed-bottom bg-white border-top shadow-lg d-flex justify-content-around align-items-center pb-2 pt-2 px-1">
        <a href="dashboard.html" class="nav-item active"><i class="bi bi-stars fs-5 d-block"></i><span>Home</span></a>
        <a href="maps.html" class="nav-item"><i class="bi bi-map fs-5 d-block"></i><span>Map</span></a>
        <a href="chat.html" class="nav-item"><i class="bi bi-chat fs-5 d-block"></i><span>Chat</span></a>
        <a href="manage-products.html" class="nav-item"><i class="bi bi-bag fs-5 d-block"></i><span>Market</span></a>
    </nav>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/role-nav.js"></script>
    <script src="js/maps.js"></script>
</body>
</html>
