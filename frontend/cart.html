<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="app-bg pb-5 mb-5">
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center"><a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-4 me-3"></i></a><h5 class="mb-0 fw-bold">Your Cart</h5></div>
    </header>
    <main class="container" style="margin-top: 100px;">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 d-flex align-items-center">
                        <div class="flex-grow-1"><h6 class="fw-bold mb-1">BUP School Supplies</h6><h6 class="text-success fw-bold">₱150.00</h6></div>
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-sm btn-outline-secondary rounded-circle">-</button><span class="fw-bold">1</span><button class="btn btn-sm btn-outline-secondary rounded-circle">+</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Summary</h5>
                        <div class="d-flex justify-content-between fw-bold fs-5 mb-4"><span>Total</span><span class="text-orange">₱150.00</span></div>
                        <a href="order-status.html" class="btn btn-orange w-100 py-3 rounded-pill fw-bold text-center text-decoration-none">Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>
