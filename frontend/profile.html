<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - Campus Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .bg-orange { background-color: #FF6B35; }
        .text-orange { color: #FF6B35; }
        .logout-card { cursor: pointer; transition: background-color 0.2s; }
        .logout-card:hover { background-color: #fff5f2; }
    </style>
</head>
<body class="app-bg pb-5 mb-5">
    
    <!-- Top Header -->
    <header class="app-header text-white p-3 shadow-sm fixed-top d-flex align-items-center">
        <!-- Back button dynamically goes to previous page -->
        <a href="javascript:history.back()" class="text-white text-decoration-none me-3">
            <i class="bi bi-arrow-left fs-4"></i>
        </a>
        <h5 class="mb-0 fw-bold">My Profile</h5>
    </header>

    <!-- Main Content -->
    <main id="app-content" class="container" style="margin-top: 100px;">
        
        <div class="card border-0 rounded-4 shadow-sm mb-4">
            <div class="card-body text-center p-4">
                <div id="profileInitials" class="rounded-circle bg-orange text-white d-inline-flex align-items-center justify-content-center mb-3 fw-bold" style="width: 80px; height: 80px; font-size: 2rem;">
                    --
                </div>
                <h4 id="profileName" class="fw-bold text-dark mb-1">Loading...</h4>
                <p id="profileRole" class="text-muted small mb-0">Loading details...</p>
            </div>
        </div>

        <h5 class="fw-bold mb-3 text-dark px-1">My Orders</h5>
        <div id="orderContainer" class="mb-4">
            <div class="text-center text-muted mt-3 spinner-border spinner-border-sm" role="status"></div>
            <span class="text-muted ms-2">Loading your orders...</span>
        </div>

        <div class="card border-0 rounded-4 shadow-sm logout-card" id="logoutBtn">
            <div class="card-body p-3 d-flex align-items-center text-danger">
                <i class="bi bi-box-arrow-right fs-5 me-3"></i>
                <h6 class="mb-0 fw-bold">Logout</h6>
            </div>
        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
