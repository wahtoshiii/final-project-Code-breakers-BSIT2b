<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status - Campus Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="app-bg">
    <header class="app-header text-white p-3 shadow-sm fixed-top">
        <div class="container d-flex align-items-center"><a href="dashboard.html" class="text-white"><i class="bi bi-arrow-left fs-4 me-3"></i></a><h5 class="mb-0 fw-bold">Order Tracking</h5></div>
    </header>
    <main class="container" style="margin-top: 100px;">
        <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
            <div class="icon-circle bg-orange text-white mx-auto mb-3" style="width: 80px; height: 80px; font-size: 2rem;"><i class="bi bi-check2-circle"></i></div>
            <h4 class="fw-bold">Order Placed!</h4>
            <p class="text-muted mb-4">Your order has been sent.</p>
            <span class="badge bg-warning text-dark px-4 py-2 rounded-pill fs-6 mb-4">Pending</span>
            <a href="dashboard.html" class="btn btn-outline-teal w-100 rounded-pill py-2 fw-bold">Return to Home</a>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
